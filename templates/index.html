<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Boletines</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Generador de Boletines</h1>
            <p class="subtitle">Carga tu archivo Excel, selecciona periodos y descarga el reporte final.</p>

            {% if error %}
            <div class="alert" role="alert">{{ error }}</div>
            {% endif %}

            <form method="post" action="{{ url_for('generar') }}" enctype="multipart/form-data">
                <label class="label" for="archivo_excel">Archivo Excel (.xlsx)</label>
                <input id="archivo_excel" name="archivo_excel" type="file" accept=".xlsx" required>

                <fieldset>
                    <legend>Periodos a incluir</legend>
                    <div class="periodos-actions">
                        <button type="button" class="btn-link" id="btn_periodos_todos">Seleccionar todos</button>
                        <button type="button" class="btn-link" id="btn_periodos_limpiar">Limpiar seleccion</button>
                    </div>
                    <div class="periodos">
                        {% for periodo in periodos %}
                        <label class="checkbox-item">
                            <input
                                type="checkbox"
                                name="periodos"
                                value="{{ periodo }}"
                                {% if periodo in periodos_default %}checked{% endif %}
                            >
                            <span>{{ periodo }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Configuracion de salida</legend>

                    <div class="form-row">
                        <label class="row-label">Formato</label>
                        <div class="options-inline">
                            <label><input type="radio" name="formato" value="excel" {% if config.formato == 'excel' %}checked{% endif %}> Excel</label>
                            <label><input type="radio" name="formato" value="pdf" {% if config.formato == 'pdf' %}checked{% endif %}> PDF</label>
                            <label><input type="radio" name="formato" value="word" {% if config.formato == 'word' %}checked{% endif %}> Word</label>
                        </div>
                    </div>

                    <div class="grid-2">
                        <label>
                            <span class="mini-label">Estudiantes por fila</span>
                            <input type="number" name="estudiantes_por_fila" min="1" max="12" value="{{ config.estudiantes_por_fila }}">
                        </label>
                        <label>
                            <span class="mini-label">Filas por hoja</span>
                            <input type="number" name="filas_por_hoja" min="1" max="10" value="{{ config.filas_por_hoja }}">
                        </label>
                    </div>

                    <div class="form-row top-gap">
                        <label class="row-label">Tamano de pagina</label>
                        <div class="options-inline">
                            <label><input type="radio" name="tamano_pagina" value="carta" {% if config.tamano_pagina == 'carta' %}checked{% endif %}> Carta</label>
                            <label><input type="radio" name="tamano_pagina" value="a4" {% if config.tamano_pagina == 'a4' %}checked{% endif %}> A4</label>
                            <label><input id="tamano_custom_radio" type="radio" name="tamano_pagina" value="custom" {% if config.tamano_pagina == 'custom' %}checked{% endif %}> Personalizado</label>
                        </div>
                    </div>

                    <div class="grid-2" id="custom_size_fields">
                        <label>
                            <span class="mini-label">Ancho (cm)</span>
                            <input type="number" step="0.01" name="pagina_ancho_cm" value="{{ config.pagina_ancho_cm }}">
                        </label>
                        <label>
                            <span class="mini-label">Alto (cm)</span>
                            <input type="number" step="0.01" name="pagina_alto_cm" value="{{ config.pagina_alto_cm }}">
                        </label>
                    </div>

                    <div class="form-row top-gap">
                        <label class="row-label">Orientacion</label>
                        <div class="options-inline">
                            <label><input type="radio" name="orientacion" value="vertical" {% if config.orientacion == 'vertical' %}checked{% endif %}> Vertical</label>
                            <label><input type="radio" name="orientacion" value="horizontal" {% if config.orientacion == 'horizontal' %}checked{% endif %}> Horizontal</label>
                        </div>
                    </div>
                </fieldset>

                <button type="submit">Generar Reporte</button>
            </form>
        </section>
    </main>

    <script>
        const radiosTamano = document.querySelectorAll('input[name="tamano_pagina"]');
        const customSizeFields = document.getElementById('custom_size_fields');
        const checkboxesPeriodos = document.querySelectorAll('input[name="periodos"]');
        const btnPeriodosTodos = document.getElementById('btn_periodos_todos');
        const btnPeriodosLimpiar = document.getElementById('btn_periodos_limpiar');

        function actualizarCamposCustom() {
            const seleccionado = document.querySelector('input[name="tamano_pagina"]:checked');
            const visible = seleccionado && seleccionado.value === 'custom';
            customSizeFields.classList.toggle('hidden', !visible);
        }

        radiosTamano.forEach((radio) => {
            radio.addEventListener('change', actualizarCamposCustom);
        });

        btnPeriodosTodos.addEventListener('click', () => {
            checkboxesPeriodos.forEach((checkbox) => {
                checkbox.checked = true;
            });
        });

        btnPeriodosLimpiar.addEventListener('click', () => {
            checkboxesPeriodos.forEach((checkbox) => {
                checkbox.checked = false;
            });
        });

        actualizarCamposCustom();
    </script>
</body>
</html>
