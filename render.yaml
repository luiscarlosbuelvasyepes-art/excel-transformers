services:
  - type: web
    name: generador-boletines
    env: python
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    autoDeploy: true
    healthCheckPath: /health